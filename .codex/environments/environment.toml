# THIS IS AUTOGENERATED. DO NOT EDIT MANUALLY
version = 1
name = "pyterm-mcp"

[setup]
script = '''
set -euo pipefail

export UV_CACHE_DIR="/private/tmp/pyterm-mcp-uv-cache"

uv sync --dev --python=3.12
mkdir -p .codex/bin

ln -sf "$(pwd)/.venv/bin/python" .codex/bin/python
ln -sf "$(pwd)/.venv/bin/python" .codex/bin/python3

cat > .codex/env.sh <<'EOF'
export PATH="$PWD/.codex/bin:$PWD/.venv/bin:$PATH"
export UV_CACHE_DIR="/private/tmp/pyterm-mcp-uv-cache"
export UV_TOOL_DIR="$PWD/.codex/tools"
export UV_TOOL_BIN_DIR="$PWD/.codex/bin"
EOF
'''

[[actions]]
name = "Run Tests"
icon = "test"
command = '''
source .codex/env.sh
pytest
'''

[[actions]]
name = "Lint"
icon = "tool"
command = '''
source .codex/env.sh
uv run --python=3.12 ruff check .
'''

[[actions]]
name = "Format Check"
icon = "tool"
command = '''
source .codex/env.sh
uv run --python=3.12 ruff format --check .
'''

[[actions]]
name = "Format"
icon = "tool"
command = '''
source .codex/env.sh
uv run --python=3.12 ruff format .
'''

[[actions]]
name = "Typecheck"
icon = "tool"
command = '''
source .codex/env.sh
uv run --python=3.12 ty check .
'''

[[actions]]
name = "Verify Project Executables (`pyterm_dev`, `pyterm_mcp`, `pyterm_test`)"
icon = "tool"
command = '''
source .codex/env.sh

command -v python
python --version

command -v pyterm_dev
command -v pyterm_mcp
command -v pyterm_test

pyterm_dev --help
pyterm_mcp --help
pyterm_test --help
'''

[[actions]]
name = "Install Project Executables"
icon = "tool"
command = '''
source .codex/env.sh

uv tool install --force --editable . --project=. --python=./.venv/bin/python

command -v pyterm_dev
command -v pyterm_mcp
command -v pyterm_test
'''
